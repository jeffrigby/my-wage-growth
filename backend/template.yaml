AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Real Wage Growth Backend

  SAM Template for wage-growth-backend

Globals:
  Function:
    Timeout: 60
    MemorySize: 512
    Runtime: nodejs22.x
    Tracing: Active
    Environment:
      Variables:
        POWERTOOLS_SERVICE_NAME: myWageGrowth
        POWERTOOLS_METRICS_NAMESPACE: myWageGrowth
        LOG_LEVEL: INFO
        APPCONFIG_APP_ID: !Ref AppConfigApplication
        APPCONFIG_ENV_ID: !Ref AppConfigEnvironment
        APPCONFIG_PROFILE_ID: !Ref AppConfigConfigurationProfile
        WAGE_GROWTH_BUCKET: !Ref WageGrowthBucket

Resources:
  GetUSCPIDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: Get US CPI-U Data Lambda Function
      Handler: get-us-cpi-data.handler
      Policies:
        - VPCAccessPolicy: {}
        - S3CrudPolicy:
            BucketName: !Ref WageGrowthBucket
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Format: esm
        Minify: true
        OutExtension:
          - .js=.mjs
        Target: "es2022"
        Sourcemap: true
        Banner:
          - js=const require = (await import('node:module')).createRequire(import.meta.url);const __filename = (await import('node:url')).fileURLToPath(import.meta.url);const __dirname = (await import('node:path')).dirname(__filename);
        EntryPoints:
          - src/handlers/get-us-cpi-data.ts
        External:
          - "@aws-sdk/client-sso"
          - "@aws-sdk/client-sso-oidc"
          - "@aws-sdk/credential-provider-ini"
          - "@aws-sdk/credential-provider-process"
          - "@aws-sdk/credential-provider-sso"
          - "@aws-sdk/credential-provider-web-identity"
          - "@aws-sdk/token-providers"

  GetCanadianCPIDataFunction:
    Type: AWS::Serverless::Function
    Properties:
      Description: Get Canadian CPI Data Lambda Function
      Handler: get-canadian-cpi-data.handler
      Timeout: 120 # Increased timeout for downloading large CSV file
      MemorySize: 1024 # Increased memory for processing CSV data
      Policies:
        - VPCAccessPolicy: {}
        - S3CrudPolicy:
            BucketName: !Ref WageGrowthBucket
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Format: esm
        Minify: true
        OutExtension:
          - .js=.mjs
        Target: "es2022"
        Sourcemap: true
        Banner:
          - js=const require = (await import('node:module')).createRequire(import.meta.url);const __filename = (await import('node:url')).fileURLToPath(import.meta.url);const __dirname = (await import('node:path')).dirname(__filename);
        EntryPoints:
          - src/handlers/get-canadian-cpi-data.ts
        External:
          - "@aws-sdk/client-sso"
          - "@aws-sdk/client-sso-oidc"
          - "@aws-sdk/credential-provider-ini"
          - "@aws-sdk/credential-provider-process"
          - "@aws-sdk/credential-provider-sso"
          - "@aws-sdk/credential-provider-web-identity"
          - "@aws-sdk/token-providers"

  # S3
  WageGrowthBucket:
    Type: AWS::S3::Bucket
    Properties:
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: FrontendFiles
            Status: Enabled
            Prefix: "static/"
            NoncurrentVersionExpirationInDays: 30
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
          - Id: CPIDataFiles
            Status: Enabled
            Prefix: "cpi/"
            Transitions:
              - StorageClass: INTELLIGENT_TIERING
                TransitionInDays: 30
            NoncurrentVersionTransitions:
              - StorageClass: INTELLIGENT_TIERING
                TransitionInDays: 1
            NoncurrentVersionExpirationInDays: 7
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1
          - Id: GeneralCleanup
            Status: Enabled
            Prefix: ""
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 1

  WageGrowthBucketBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WageGrowthBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub arn:aws:s3:::${WageGrowthBucket}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  # CloudFront
  CloudFrontOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${AWS::StackName}-OAC
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: !Sub ${AWS::StackName} CloudFront Distribution
        DefaultRootObject: index.html
        Enabled: true
        HttpVersion: http2
        IPV6Enabled: true
        PriceClass: PriceClass_100
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt WageGrowthBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !Ref CloudFrontOriginAccessControl
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # Managed-CachingOptimized
          OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf  # Managed-CORS-S3Origin
          ResponseHeadersPolicyId: 67f7725c-6f97-4210-82d7-5512b31e9d03  # Managed-SecurityHeadersPolicy
        CacheBehaviors:
          - PathPattern: "/static/*"
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # Managed-CachingOptimized
            OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf  # Managed-CORS-S3Origin
            ResponseHeadersPolicyId: 67f7725c-6f97-4210-82d7-5512b31e9d03  # Managed-SecurityHeadersPolicy
          - PathPattern: "/cpi/*"
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # Managed-CachingDisabled (for frequently updated data)
            OriginRequestPolicyId: 88a5eaf4-2fd4-4709-b370-b4c650ea3fcf  # Managed-CORS-S3Origin
            ResponseHeadersPolicyId: 67f7725c-6f97-4210-82d7-5512b31e9d03  # Managed-SecurityHeadersPolicy
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /static/index.html
            ErrorCachingMinTTL: 300
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /static/index.html
            ErrorCachingMinTTL: 300

  # AppConfig
  AppConfigApplication:
    Type: AWS::AppConfig::Application
    Properties:
      Name: !Sub ${AWS::StackName}-appconfig
      Description: Configuration settings for My Wage Growth Calculator

  AppConfigEnvironment:
    Type: AWS::AppConfig::Environment
    Properties:
      ApplicationId: !Ref AppConfigApplication
      Name: !Sub ${AWS::StackName}-environment
      Description: "The environment for My Wage Growth Calculator"

  AppConfigConfigurationProfile:
    Type: AWS::AppConfig::ConfigurationProfile
    Properties:
      ApplicationId: !Ref AppConfigApplication
      Name: !Sub ${AWS::StackName}-profile
      LocationUri: hosted
      Type: AWS.Freeform

  ApplicationResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name: !Sub ApplicationInsights-SAM-${AWS::StackName}
      ResourceQuery:
        Type: CLOUDFORMATION_STACK_1_0

  ApplicationInsightsMonitoring:
    Type: AWS::ApplicationInsights::Application
    Properties:
      ResourceGroupName:
        Ref: ApplicationResourceGroup
      AutoConfigurationEnabled: "true"

Outputs:
  GetUSCPIDataFunction:
    Description: GetUSCPIData Lambda Function ARN
    Value: !GetAtt GetUSCPIDataFunction.Arn
    Export:
      Name: !Sub ${AWS::StackName}-GetUSCPIDataFunctionArn
  GetUSCPIDataFunctionRole:
    Description: Implicit IAM Role created for GetUSCPIData function
    Value: !GetAtt GetUSCPIDataFunctionRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-GetUSCPIDataFunctionRoleArn
  GetCanadianCPIDataFunction:
    Description: GetCanadianCPIData Lambda Function ARN
    Value: !GetAtt GetCanadianCPIDataFunction.Arn
    Export:
      Name: !Sub ${AWS::StackName}-GetCanadianCPIDataFunctionArn
  GetCanadianCPIDataFunctionRole:
    Description: Implicit IAM Role created for GetCanadianCPIData function
    Value: !GetAtt GetCanadianCPIDataFunctionRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-GetCanadianCPIDataFunctionRoleArn
  WageGrowthBucket:
    Description: S3 Bucket for storing CPI data and static frontend files
    Value: !Ref WageGrowthBucket
    Export:
      Name: !Sub ${AWS::StackName}-WageGrowthBucketName
  WageGrowthBucketArn:
    Description: S3 Bucket ARN
    Value: !GetAtt WageGrowthBucket.Arn
    Export:
      Name: !Sub ${AWS::StackName}-WageGrowthBucketArn
  WageGrowthBucketDomainName:
    Description: S3 Bucket Domain Name for CloudFront origin
    Value: !GetAtt WageGrowthBucket.RegionalDomainName
    Export:
      Name: !Sub ${AWS::StackName}-WageGrowthBucketDomainName
  WageGrowthBucketPolicy:
    Description: S3 Bucket Policy for CloudFront access
    Value: !Ref WageGrowthBucketBucketPolicy
    Export:
      Name: !Sub ${AWS::StackName}-WageGrowthBucketPolicy
  AppConfigApplication:
    Description: AppConfig Application ID
    Value: !Ref AppConfigApplication
    Export:
      Name: !Sub ${AWS::StackName}-AppConfigApplicationId
  AppConfigEnvironment:
    Description: AppConfig Environment ID
    Value: !Ref AppConfigEnvironment
    Export:
      Name: !Sub ${AWS::StackName}-AppConfigEnvironmentId
  AppConfigConfigurationProfile:
    Description: AppConfig Configuration Profile ID
    Value: !Ref AppConfigConfigurationProfile
    Export:
      Name: !Sub ${AWS::StackName}-AppConfigConfigurationProfileId
  ApplicationResourceGroup:
    Description: Application Resource Group Name
    Value: !Ref ApplicationResourceGroup
    Export:
      Name: !Sub ${AWS::StackName}-ApplicationResourceGroupName
  ApplicationInsightsMonitoring:
    Description: Application Insights Application Name
    Value: !Ref ApplicationInsightsMonitoring
    Export:
      Name: !Sub ${AWS::StackName}-ApplicationInsightsApplicationName
  CloudFrontDistribution:
    Description: CloudFront Distribution ID
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub ${AWS::StackName}-CloudFrontDistributionId
  CloudFrontDistributionDomainName:
    Description: CloudFront Distribution Domain Name
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub ${AWS::StackName}-CloudFrontDistributionDomainName
  CloudFrontOriginAccessControl:
    Description: CloudFront Origin Access Control ID
    Value: !Ref CloudFrontOriginAccessControl
    Export:
      Name: !Sub ${AWS::StackName}-CloudFrontOriginAccessControlId
